<!DOCTYPE html>
<html>
<head>
    <title>Study Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h1>📚 Study Dashboard</h1>

        <!-- Add Task Form -->
        <form action="/add" method="POST">
            <input type="text" name="task" placeholder="Enter a study task..." required>
            <button type="submit">Add Task</button>
        </form>

        <h2>Your Tasks</h2>

        <ul>
            {% for task in tasks %}
                <li class="{% if task.done %}done{% endif %}">
                    {{ task.name }}

                    {% if not task.done %}
                        <a href="/done/{{ loop.index0 }}">✔ Done</a>
                    {% endif %}

                    <a href="/delete/{{ loop.index0 }}">❌ Delete</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
